services:
  db:
    image: postgres:16
    container_name: myshop1_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: myshop
      POSTGRES_USER: myshop_user
      POSTGRES_PASSWORD: Leokesho@1
    volumes:
      - myshop1_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myshop_user -d myshop"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./myshop
    env_file:
      - .env.prod
    ports:
      - "8002:8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput || true &&
      gunicorn myshop.wsgi:application --bind 0.0.0.0:8000
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/token/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  myshop1_postgres_data: